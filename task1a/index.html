<head>
    
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
        const FILMS = [
            { id: 1, title: 'Oppenheimer',       year: 2023, genre: 'Dramat',  rating: 5, watched: true  },
            { id: 2, title: 'Dune: Część druga', year: 2024, genre: 'Sci-Fi',  rating: 4, watched: false },
            { id: 3, title: 'Past Lives',        year: 2023, genre: 'Romans',  rating: 5, watched: true  },
            { id: 4, title: 'Poor Things',       year: 2023, genre: 'Komedia', rating: 4, watched: false },
        ];

        const RATINGS = ["☆☆☆☆☆", "★☆☆☆☆", "★★☆☆☆", "★★★☆☆", "★★★★☆", "★★★★★"];

        function RatingStars({rating}) {
            return React.createElement("span", null, RATINGS[rating]);
        }

        function FilmCard({title, year, genre, rating, watched}) 
        {
            return React.createElement("div", {className: "FilmCard"}, [
                React.createElement("h3", null, `${title} (${year})`),
                React.createElement("span", null, genre),
                React.createElement(RatingStars, {rating}),
                watched && React.createElement("p", null, "✓ Obejrzany")
            ]);
        }

        function App() {
            return React.createElement("div", {className: "App"}, [
                React.createElement("h1", null, "🎬 Biblioteka Filmów"),
                FILMS.map((f) => React.createElement(FilmCard, {key: f.id, ...f}))
            ]);
        }

        ReactDOM.createRoot(document.getElementById('root')).render(App());

        console.log(React.createElement('span', null, '★★★☆☆'));
        console.log(React.createElement(FilmCard, { title: 'Test', year: 2024, genre: 'Dramat', rating: 3, watched: false }));
    </script>
</body>
